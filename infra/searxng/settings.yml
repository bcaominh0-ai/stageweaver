use_default_settings: true

server:
  bind_address: "127.0.0.1"
  port: 8080
  secret_key: "stageweaver-local-development-only"
  limiter: false
  image_proxy: false

search:
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  extra_proxy_timeout: 10
  proxies:
    all://:
      - http://127.0.0.1:7891
